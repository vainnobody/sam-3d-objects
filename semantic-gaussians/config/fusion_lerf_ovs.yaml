scene:
  scene_path: "../data/lerf_ovs/teatime"
  dataset_name: "lerf_ovs"
  test_cameras: False
  colmap_images: "images"
  colmap_eval_hold: 8
  downscale_ratio: 1
  white_background: False
  device: "cuda:0"
  
pipeline:
  convert_shs_python: False
  compute_cov3d_python: False
  debug: False
  seed: 0

model:
  sh_degree: 3
  model_dir: "./output/lerf_ovs/teatime"
  dynamic: False
  load_iteration: -1
  device: "cuda:0"

fusion:
  img_dim: [648, 484]
  num_workers: 8
  gc_collect_interval: 10
  empty_cache_interval: 1
  model_2d: openseg
  clip_batch_size: 8
  depth: render
  depth_scale: 1000.0
  visibility_threshold: 0.05
  cut_boundary: 10
  n_split_points: 9999999
  num_rand_file_per_scene: 1
  out_dir: "./fusion_lerf_ovs/teatime"
